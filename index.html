<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Notes App</title>
</head>
<body>
    <div class="container">
        <h1>MY NOTES</h1>

        <div class="notaContainer">
            <h3>Nota</h3>
            <div class="inputContainer">
                <input id="titleInput" type="text" placeholder="Titulo">
                <textarea id="textInput" placeholder="Texto"></textarea>
                <button id="submitInput" type="submit">Criar</button>
            </div>
        </div>

        <div class="notasCriadas">
            <h2>Notas</h2>
            <label id="notaTitulo">0</label><br>
            <label id="notaTexto">1</label>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
