<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Notes App</title>
</head>
<body>
    <div class="appContainer">
        <h1>MY NOTES</h1>

        <div class="notaContainer">
            <h3>Nota</h3>
            <div class="inputContainer">
                <input id="titleInput" type="text" placeholder="Titulo">
                <textarea id="textInput" placeholder="Texto"></textarea>
                <button id="submitInput" type="submit">Criar</button>
            </div>
        </div>

        <div class="pesquisaContainer">
            <input id="pesquisaInput" type="text" placeholder="Pesquisa">
            <button id="pesquisaButton">Pesquisar</button>
        </div>

        <div id="filtrosContainer"></div>

        <div class="notasCriadas">
            <div id="notasDisplay"></div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
